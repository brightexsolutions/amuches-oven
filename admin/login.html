<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — Amuche's Oven</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎂</text></svg>" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" crossorigin="anonymous" />
  <link rel="stylesheet" href="../css/variables.css" />
  <link rel="stylesheet" href="../css/global.css" />
  <link rel="stylesheet" href="../css/admin.css" />
</head>
<body class="admin-body">

<div id="page-loader"><div class="loader-logo">Amuche's Oven</div></div>

<div class="admin-login-wrapper">
  <!-- Art side -->
  <div class="admin-login-art">
    <img src="https://images.unsplash.com/photo-1535254973040-607b474cb50d?w=1200&q=80&auto=format&fit=crop" alt="" aria-hidden="true" />
    <div class="admin-login-art-content">
      <div class="admin-login-art-title">Amuche's Oven<br/>Admin Portal</div>
      <p class="admin-login-art-sub">Manage orders, cakes, schedule<br/>and your growing business.</p>
    </div>
  </div>

  <!-- Form side -->
  <div class="admin-login-form-wrapper">
    <div class="admin-login-form">
      <div class="admin-login-logo">Amuche's Oven</div>
      <p class="admin-login-subtitle">Sign in to your admin dashboard</p>

      <form id="login-form" novalidate>
        <div class="form-group" style="margin-bottom:var(--sp-5)">
          <label class="form-label" for="login-email">Email Address</label>
          <input class="form-input" type="email" id="login-email" placeholder="admin@amuchesoven.co.ke" autocomplete="email" required />
        </div>
        <div class="form-group" style="margin-bottom:var(--sp-6)">
          <label class="form-label" for="login-password">Password</label>
          <div style="position:relative">
            <input class="form-input" type="password" id="login-password" placeholder="••••••••" autocomplete="current-password" required style="padding-right:var(--sp-10)" />
            <button type="button" id="toggle-pw" style="position:absolute;right:var(--sp-3);top:50%;transform:translateY(-50%);background:none;border:none;color:var(--clr-stone-400);cursor:pointer;font-size:var(--fz-sm)">
              <i class="fas fa-eye" id="toggle-pw-icon"></i>
            </button>
          </div>
        </div>

        <div id="login-error" class="hidden" style="background:rgba(181,58,42,0.08);border:1px solid rgba(181,58,42,0.2);border-radius:var(--radius-md);padding:var(--sp-3) var(--sp-4);margin-bottom:var(--sp-4);font-size:var(--fz-sm);color:var(--clr-error);display:flex;align-items:center;gap:var(--sp-2)">
          <i class="fas fa-circle-xmark"></i><span id="login-error-msg">Invalid credentials.</span>
        </div>

        <button type="submit" class="btn btn--primary btn--lg" id="login-btn" style="width:100%;justify-content:center;">
          <i class="fas fa-lock"></i> Sign In
        </button>
      </form>

      <p style="margin-top:var(--sp-8);font-size:var(--fz-xs);color:var(--clr-stone-400);text-align:center">
        <a href="../index.html" style="color:var(--clr-stone-400)"><i class="fas fa-arrow-left"></i> Back to website</a>
      </p>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="../_env.js"></script>
<script type="module" src="../js/admin/login.js"></script>
</body>
</html>
