# ============================================================
# netlify.toml — Amuche's Oven Deployment Configuration
# ============================================================

[build]
  publish = "."
  command = "node scripts/inject-env.js"

[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "SUPABASE_ANON_KEY,SUPABASE_URL"

[[redirects]]
  from   = "/admin"
  to     = "/admin/index.html"
  status = 200

[[redirects]]
  from   = "/menu"
  to     = "/menu.html"
  status = 200

[[redirects]]
  from   = "/order"
  to     = "/order.html"
  status = 200

[[redirects]]
  from   = "/track"
  to     = "/track.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/_env.js"
  [headers.values]
    Cache-Control = "no-store, no-cache"
